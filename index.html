<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#111827" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="单词软件" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" href="./app-icon-180.png" />
    <title>单词软件</title>
    <style>
:root {
  --bg: #111827;
  --bg-deep: #0f1724;
  --panel: #182334;
  --panel-2: #202b3e;
  --panel-3: #273247;
  --line: rgba(165, 180, 252, 0.08);
  --text: #d7dce8;
  --muted: #6f7788;
  --muted-2: #4d5566;
  --brand: #6c6cf6;
  --brand-2: #8d91ff;
  --good: #45c878;
  --bad: #ef6464;
  --bar: #c6d1ff;
  --shadow: 0 20px 80px rgba(23, 31, 50, 0.5);
}

body.light {
  --bg: #f3f5fb;
  --panel: #ffffff;
  --panel-2: #eef1f8;
  --panel-3: #e1e6f1;
  --text: #1f2937;
  --muted: #667085;
  --muted-2: #8a93a3;
  --line: rgba(80, 94, 128, 0.14);
  --shadow: 0 20px 80px rgba(36, 45, 70, 0.12);
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

body.light .app {
  background:
    radial-gradient(circle at 50% 12%, rgba(108, 108, 246, 0.12), transparent 28rem),
    var(--bg);
}

body.light .toolbar,
body.light .stats-card {
  background: rgba(255, 255, 255, 0.92);
}

body.light .target-text,
body.light .hint-text,
body.light .modal-header h2 {
  color: #1f2937;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

.app {
  display: grid;
  min-height: 100vh;
  grid-template-rows: 84px 1fr;
  background:
    radial-gradient(circle at 50% 12%, rgba(82, 93, 255, 0.08), transparent 28rem),
    var(--bg);
}

.header {
  display: flex;
  align-items: start;
  justify-content: center;
  padding: 4px 0 0;
}

.toolbar {
  display: flex;
  gap: 8px;
  align-items: center;
  min-height: 68px;
  padding: 0 28px;
  border-radius: 0 0 10px 10px;
  background: rgba(31, 42, 61, 0.92);
  box-shadow: var(--shadow);
}

.toolbar select,
.tool-button,
.pause-button {
  height: 36px;
  border: 0;
  border-radius: 7px;
  outline: 0;
  background: transparent;
  color: #b8becd;
}

.toolbar select {
  width: 90px;
  color: #cbd1dc;
  appearance: none;
}

.tool-button {
  min-width: 24px;
  padding: 0 4px;
  color: var(--brand);
  font-weight: 800;
}

.tool-button.text {
  min-width: 58px;
  color: #b9bfca;
  font-size: 16px;
  font-weight: 500;
}

.archive-button {
  min-width: 62px;
  padding: 0 10px;
  border-radius: 7px;
  background: rgba(108, 108, 246, 0.13);
  color: #d8dcff;
  font-weight: 800;
}

.loop-button {
  min-width: 54px;
  padding: 0 10px;
}

.tool-button.icon {
  font-size: 18px;
}

.tool-button.active {
  color: var(--good);
}

.tool-button:hover,
.pause-button:hover {
  background: rgba(255, 255, 255, 0.07);
}

.pause-button {
  min-width: 80px;
  padding: 0 16px;
  background: #3a4558;
  color: #d8dbe4;
  font-size: 18px;
  font-weight: 700;
}

.practice-screen {
  position: relative;
  display: grid;
  grid-template-rows: 96px minmax(360px, 1fr) 54px 120px;
  align-items: center;
  width: min(1100px, 88vw);
  margin: 0 auto;
  transform: translateY(-36px);
}

.nav-row {
  display: flex;
  justify-content: space-between;
  align-items: start;
  width: 100%;
  gap: 24px;
}

.next-word {
  display: grid;
  grid-template-columns: auto 40px;
  grid-template-rows: auto auto;
  column-gap: 18px;
  align-items: center;
  min-width: 320px;
  margin-right: 6px;
  color: rgba(206, 212, 225, 0.28);
  text-align: right;
  background: none;
  border: 0;
  cursor: pointer;
  padding: 0;
  font: inherit;
  transition: color 0.15s;
}

.next-word:hover {
  color: rgba(206, 212, 225, 0.7);
}

.next-word div {
  grid-column: 1;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 28px;
  letter-spacing: 2px;
}

.next-word small {
  grid-column: 1;
  color: rgba(206, 212, 225, 0.18);
}

.next-word span {
  grid-column: 2;
  grid-row: 1 / span 2;
  font-size: 34px;
}

.prev-word {
  display: grid;
  grid-template-columns: 40px auto;
  grid-template-rows: auto auto;
  column-gap: 18px;
  align-items: center;
  min-width: 200px;
  margin-left: 6px;
  color: rgba(206, 212, 225, 0.28);
  text-align: left;
  background: none;
  border: 0;
  cursor: pointer;
  padding: 0;
  font: inherit;
  transition: color 0.15s;
}

.prev-word:hover {
  color: rgba(206, 212, 225, 0.7);
}

.prev-word div {
  grid-column: 2;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 28px;
  letter-spacing: 2px;
}

.prev-word small {
  grid-column: 2;
  color: rgba(206, 212, 225, 0.18);
}

.prev-word span {
  grid-column: 1;
  grid-row: 1 / span 2;
  font-size: 34px;
}

.word-card {
  display: grid;
  position: relative;
  justify-items: center;
  align-self: center;
  min-height: 360px;
  padding-top: 0;
  align-content: center;
  text-align: center;
}

.target-text {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 0.055em;
  min-height: 68px;
  max-width: 100%;
  overflow-wrap: anywhere;
  color: #d2d7e2;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: clamp(30px, 4.2vw, 50px);
  font-weight: 500;
  line-height: 1.2;
  letter-spacing: 0;
}

.target-text.sentence-target {
  max-width: 980px;
  font-size: clamp(22px, 2.7vw, 36px);
  line-height: 1.35;
}

.target-text.has-wrong {
  animation: word-shake 0.82s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
}

.char-word {
  display: inline-flex;
  gap: 0.055em;
}

.char {
  position: relative;
  display: inline-grid;
  min-width: 0.58em;
  place-items: center;
  color: #d2d7e2;
  text-shadow: 0 0 18px rgba(214, 221, 236, 0.03);
  transition:
    color 90ms ease,
    transform 90ms ease,
    text-shadow 90ms ease;
}

.dictation-char.word-hidden {
  min-width: 0.52em;
  color: #c9cfdb;
  font-weight: 600;
  transform: translateY(-0.03em);
}

.dictation-char.sentence-hidden {
  min-width: 0.74em;
  color: #c8cfdd;
  font-size: 0.62em;
  transform: translateY(0.02em);
}

.dictation-char.hidden-space {
  opacity: 0;
}

.char.done {
  color: var(--good);
  text-shadow: 0 0 18px rgba(69, 200, 120, 0.12);
}

.char.wrong {
  color: var(--bad);
  transform: translateY(-1px);
  text-shadow: 0 0 18px rgba(239, 100, 100, 0.25);
  animation: wrong-shake 140ms ease;
}

.char.current::after {
  content: none;
}

.caret {
  align-self: center;
  width: 2px;
  height: 0.9em;
  margin: 0 -0.08em 0 -0.08em;
  border-radius: 999px;
  background: rgba(199, 207, 231, 0.68);
  transform: translateY(-0.02em);
  animation: caret-blink 1.1s steps(2, start) infinite;
}

.inline-speak {
  align-self: center;
  margin-left: 0.25em;
  padding: 0;
  border: 0;
  background: transparent;
  color: #5f697d;
  font-size: 0.7em;
  line-height: 1;
  cursor: pointer;
}

.practice-input {
  position: fixed;
  left: 50%;
  bottom: max(10px, env(safe-area-inset-bottom));
  z-index: -1;
  width: 1px;
  height: 1px;
  border: 0;
  opacity: 0.01;
  pointer-events: none;
  resize: none;
  font-size: 16px;
}

.phonetic {
  min-height: 28px;
  margin-top: -4px;
  color: #9ba3b2;
  font-size: 14px;
}

.hint-text {
  max-width: 820px;
  min-height: 34px;
  margin-top: 14px;
  color: #d4d9e4;
  font-size: 18px;
  line-height: 1.55;
}

.hint-text.example-translation {
  max-width: 920px;
  color: #e2e7f1;
  font-size: 18px;
}

.hint-text.hidden {
  opacity: 0;
}

.example-text {
  max-width: 860px;
  min-height: 42px;
  margin-top: 14px;
  color: #aeb8cc;
  font-size: 17px;
  font-style: italic;
  line-height: 1.55;
}

.example-text.example-note {
  min-height: 26px;
  margin-top: 8px;
  color: #8792a7;
  font-size: 15px;
  font-style: normal;
}

.example-text[hidden] {
  display: none;
}

.typed-preview {
  min-height: 26px;
  margin-top: 20px;
  color: #6f7788;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 14px;
  letter-spacing: 0;
}

.progress-wrap {
  align-self: end;
  justify-self: center;
  width: 384px;
  height: 8px;
  border-radius: 999px;
  background: rgba(103, 113, 139, 0.3);
  overflow: hidden;
}

.progress-bar {
  width: 0%;
  height: 100%;
  border-radius: inherit;
  background: var(--bar);
  transition: width 180ms ease;
}

.stats-card {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 34px;
  align-items: center;
  align-self: end;
  width: min(922px, 92vw);
  min-height: 140px;
  margin: 0 auto;
  padding: 30px 34px;
  border-radius: 10px;
  background: rgba(29, 40, 57, 0.9);
  box-shadow: var(--shadow);
}

.stat {
  display: grid;
  gap: 12px;
  text-align: center;
}

.stat strong {
  color: #687183;
  font-size: 22px;
  font-weight: 800;
}

.stat span {
  padding-top: 10px;
  border-top: 1px solid rgba(191, 199, 214, 0.48);
  color: #687183;
  font-size: 13px;
}

.modal-backdrop {
  position: fixed;
  inset: 0;
  display: grid;
  place-items: center;
  padding: 28px;
  background: rgba(5, 10, 18, 0.62);
  backdrop-filter: blur(8px);
}

.modal-backdrop[hidden] {
  display: none;
}

.modal {
  width: min(980px, 96vw);
  max-height: 86vh;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: #172233;
  box-shadow: var(--shadow);
}

body.light .modal,
body.light .modal-header {
  background: #ffffff;
}

.modal-header {
  position: sticky;
  top: 0;
  z-index: 2;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--line);
  background: #172233;
}

.modal-header small {
  color: var(--brand-2);
  font-weight: 800;
  text-transform: uppercase;
}

.modal-header h2 {
  margin: 4px 0 0;
  font-size: 24px;
}

.panel {
  padding: 24px;
}

.import-layout {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 320px;
  gap: 22px;
}

.field-label {
  display: block;
  margin: 18px 0 8px;
  color: #8992a5;
  font-size: 14px;
  font-weight: 800;
}

.field-label:first-child {
  margin-top: 0;
}

.field {
  width: 100%;
  min-height: 42px;
  border: 1px solid rgba(165, 180, 252, 0.12);
  border-radius: 8px;
  outline: 0;
  background: #101827;
  color: var(--text);
  padding: 0 12px;
}

.field:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 3px rgba(108, 108, 246, 0.14);
}

.textarea {
  min-height: 280px;
  padding: 14px;
  resize: vertical;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  line-height: 1.55;
}

.import-actions,
.modal-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  margin-top: 14px;
}

.primary-button,
.secondary-button,
.danger-button {
  min-height: 40px;
  border: 0;
  border-radius: 8px;
  padding: 0 16px;
  color: #dce1ec;
  font-weight: 800;
}

.primary-button {
  background: var(--brand);
}

.secondary-button {
  background: #2b3548;
}

.danger-button {
  background: rgba(239, 100, 100, 0.16);
  color: #ff9d9d;
}

.format-note {
  padding: 18px;
  border-radius: 10px;
  background: #101827;
  color: #9ca4b5;
}

.format-note h3 {
  margin: 0 0 12px;
  color: #dce1ec;
}

.format-note p {
  line-height: 1.55;
}

pre {
  overflow: auto;
  padding: 14px;
  border-radius: 8px;
  background: #0c1220;
  color: #cad2df;
  line-height: 1.55;
}

code {
  color: #c8ceff;
}

.list {
  display: grid;
  gap: 10px;
  margin-top: 18px;
}

.list-item {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 12px;
  padding: 14px;
  border-radius: 8px;
  background: #101827;
}

.list-item strong {
  overflow-wrap: anywhere;
  color: #dce1ec;
}

.list-item p {
  margin: 6px 0 0;
  color: #8992a5;
}

.list-item small {
  display: block;
  margin-top: 4px;
  color: #6c7488;
}

.daily-actions {
  display: flex;
  align-items: center;
  gap: 10px;
}

.ghost-button {
  background: transparent;
  border: 1px solid rgba(206, 212, 225, 0.25);
  color: #cfd5e3;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: border-color 0.15s, color 0.15s;
}

.ghost-button:hover {
  border-color: rgba(206, 212, 225, 0.6);
  color: #fff;
}

.archive-top {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 360px);
  gap: 16px;
  align-items: center;
}

.archive-summary {
  display: grid;
  gap: 6px;
}

.archive-summary strong {
  overflow-wrap: anywhere;
  color: #dce1ec;
  font-size: 22px;
}

.archive-summary span {
  color: #8992a5;
  font-size: 14px;
}

.archive-search {
  min-height: 44px;
}

.archive-letters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 18px;
}

.archive-letter {
  min-height: 34px;
  border: 1px solid rgba(165, 180, 252, 0.1);
  border-radius: 8px;
  background: #101827;
  color: #aeb6c8;
  padding: 0 10px;
  font-weight: 800;
}

.archive-letter span {
  margin-left: 6px;
  color: #687183;
  font-size: 12px;
}

.archive-letter.active {
  border-color: rgba(108, 108, 246, 0.58);
  background: rgba(108, 108, 246, 0.16);
  color: #dce1ec;
}

.archive-words {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 10px;
  margin-top: 18px;
}

.archive-card {
  display: grid;
  min-height: 128px;
  border: 1px solid rgba(165, 180, 252, 0.08);
  border-radius: 8px;
  background: #101827;
  color: inherit;
  padding: 14px;
  text-align: left;
}

.archive-card:hover {
  border-color: rgba(108, 108, 246, 0.48);
  background: #121d2f;
}

.archive-card strong {
  overflow-wrap: anywhere;
  color: #dce1ec;
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 18px;
}

.archive-card span {
  min-height: 20px;
  margin-top: 5px;
  color: #7f889b;
  font-size: 12px;
}

.archive-card p {
  margin: 8px 0 0;
  color: #a1aabc;
  font-size: 14px;
  line-height: 1.45;
}

.archive-card em {
  margin-top: 10px;
  color: #7f889b;
  font-size: 13px;
  font-style: italic;
  line-height: 1.45;
}

.archive-card small {
  margin-top: 8px;
  color: #68758c;
  font-size: 12px;
  line-height: 1.45;
}

.badge {
  height: fit-content;
  border-radius: 999px;
  padding: 5px 10px;
  background: rgba(108, 108, 246, 0.15);
  color: #aeb3ff;
  font-size: 12px;
  font-weight: 800;
}

.empty-state {
  padding: 34px;
  border: 1px dashed rgba(165, 180, 252, 0.16);
  border-radius: 10px;
  color: #8992a5;
  text-align: center;
}

.settings-grid {
  display: grid;
  gap: 12px;
}

.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 16px;
  border-radius: 10px;
  background: #101827;
}

body.light .setting-row,
body.light .format-note,
body.light .field,
body.light .list-item,
body.light .archive-letter,
body.light .archive-card {
  background: #f4f6fb;
}

body.light .archive-card:hover {
  background: #eef1f8;
}

body.light .archive-summary strong,
body.light .archive-card strong {
  color: #1f2937;
}

.setting-row strong,
.setting-row small {
  display: block;
}

.setting-row small {
  margin-top: 4px;
  color: #8992a5;
}

.setting-row input {
  width: 20px;
  height: 20px;
  accent-color: var(--brand);
}

body.paused .practice-screen {
  opacity: 0.54;
}

body.waiting .word-card::before {
  content: "";
  position: absolute;
  inset: 16px -72px;
  z-index: -1;
  border-radius: 18px;
  backdrop-filter: blur(2px);
  opacity: 0.24;
}

@keyframes caret-blink {
  50% {
    opacity: 0.1;
  }
}

@keyframes wrong-shake {
  0%,
  100% {
    transform: translateX(0);
  }
  35% {
    transform: translateX(-4px);
  }
  70% {
    transform: translateX(3px);
  }
}

@keyframes word-shake {
  10%,
  90% {
    transform: translate3d(-1px, 0, 0);
  }
  20%,
  80% {
    transform: translate3d(2px, 0, 0);
  }
  30%,
  50%,
  70% {
    transform: translate3d(-4px, 0, 0);
  }
  40%,
  60% {
    transform: translate3d(4px, 0, 0);
  }
}

@media (max-width: 980px) {
  html,
  body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
    overflow-y: hidden;
  }

  .app {
    grid-template-rows: auto 1fr;
    width: 100%;
    max-width: 100vw;
    min-width: 0;
    min-height: 100dvh;
    overflow-x: hidden;
    padding:
      env(safe-area-inset-top)
      max(10px, env(safe-area-inset-right))
      max(10px, env(safe-area-inset-bottom))
      max(10px, env(safe-area-inset-left));
  }

  .header {
    gap: 0;
    width: 100%;
    max-width: 100%;
    min-width: 0;
    overflow: hidden;
    padding: 6px 0 0;
  }

  .toolbar {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    grid-auto-rows: 32px;
    justify-content: stretch;
    align-items: center;
    width: 100%;
    max-width: 100%;
    min-width: 0;
    min-height: 76px;
    height: 76px;
    overflow: hidden;
    gap: 6px;
    padding: 6px 8px;
    border-radius: 10px;
  }

  .toolbar select,
  .tool-button,
  .pause-button {
    min-width: 0;
    width: 100%;
    max-width: 100%;
    height: 34px;
    padding: 0 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .toolbar select {
    grid-column: span 2;
    width: 100%;
    min-width: 0;
    max-width: 100%;
    padding: 0 8px;
  }

  .tool-button {
    min-width: 0;
  }

function createAudio(src, volume) {
  const audio = new Audio(src);
  audio.preload = "auto";
  audio.volume = volume;
  return audio;
}

function playSound(name) {
  if (name === "key") return;
  if ((name === "beep" || name === "correct") && !state.effectSound) return;
  const source = sounds[name];
  if (!source) return;
  const sound = source.cloneNode();
  sound.volume = source.volume;
  const playback = sound.play();
  if (playback && typeof playback.catch === "function") {
    playback.catch(() => playFallbackTone(name));
  }
}

function playFallbackTone(name) {
  const tone = fallbackTones[name];
  const AudioContext = window.AudioContext || window.webkitAudioContext;
  if (!tone || !AudioContext) return;
  try {
    audioContext ||= new AudioContext();
    const oscillator = audioContext.createOscillator();
    const gain = audioContext.createGain();
    oscillator.type = name === "beep" ? "square" : "sine";
    oscillator.frequency.value = tone.frequency;
    gain.gain.value = tone.volume;
    oscillator.connect(gain);
    gain.connect(audioContext.destination);
    oscillator.start();
    oscillator.stop(audioContext.currentTime + tone.duration);
  } catch {
    // Browser audio can be unavailable until a user gesture; normal typing will retry.
  }
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return structuredClone(defaultState);
    const parsed = JSON.parse(saved);
    if (!Array.isArray(parsed.decks) || parsed.decks.length === 0) return structuredClone(defaultState);
    return seedBuiltInDeck({ ...structuredClone(defaultState), ...parsed });
  } catch {
    return structuredClone(defaultState);
  }
}

function seedBuiltInDeck(nextState) {
  if (!cet4Items.length) return nextState;
  const existing = nextState.decks.find((deck) => deck.id === CET4_DECK_ID);
  const cet4Deck = {
    id: CET4_DECK_ID,
    name: "CET-4 四级词汇",
    chapter: `共 ${cet4Items.length} 词`,
    items: cet4Items,
    progress: existing?.progress || 0,
    createdAt: existing?.createdAt || Date.now(),
  };

  if (existing) {
    nextState.decks = nextState.decks.map((deck) => (deck.id === CET4_DECK_ID ? cet4Deck : deck));
  } else {
    nextState.decks = [cet4Deck, ...nextState.decks];
    nextState.currentDeckId = CET4_DECK_ID;
  }

  const currentExists = nextState.decks.some((deck) => deck.id === nextState.currentDeckId);
  if (!currentExists || nextState.currentDeckId === "starter") {
    nextState.currentDeckId = CET4_DECK_ID;
  }
  return nextState;
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

function currentDeck() {
  return state.decks.find((deck) => deck.id === state.currentDeckId) || state.decks[0];
}

function buildOrder() {
  const deck = currentDeck();
  currentOrder = deck.items.map((_, index) => index);
  if (state.shuffle) {
    for (let i = currentOrder.length - 1; i > 0; i -= 1) {
      const j = Math.floor(Math.random() * (i + 1));
      [currentOrder[i], currentOrder[j]] = [currentOrder[j], currentOrder[i]];
    }
  }
}

function currentIndex() {
  const deck = currentDeck();
  if (currentOrder.length !== deck.items.length) buildOrder();
  return currentOrder[deck.progress % deck.items.length] || 0;
}

function currentItem() {
  const deck = currentDeck();
  return deck.items[currentIndex()] || null;
}

function nextItem() {
  const deck = currentDeck();
  if (!deck.items.length) return null;
  const nextProgress = (deck.progress + 1) % deck.items.length;
  const index = currentOrder[nextProgress] || 0;
  return deck.items[index];
}

function prevItem() {
  const deck = currentDeck();
  if (!deck.items.length) return null;
  const prevProgress = (deck.progress - 1 + deck.items.length) % deck.items.length;
  const index = currentOrder[prevProgress] || 0;
  return deck.items[index];
}

  state.session.startedAt = Date.now();
  saveState();
  timerId = window.setInterval(renderStats, 500);
}

function formatTime(ms) {
  const seconds = Math.floor(ms / 1000);
  const minute = String(Math.floor(seconds / 60)).padStart(2, "0");
  const second = String(seconds % 60).padStart(2, "0");
  return `${minute}:${second}`;
}

function render() {
  renderDeckSelect();
  renderWord();
  renderStats();
  renderLists();
  document.body.classList.toggle("paused", state.paused);
  document.body.classList.toggle("light", state.lightMode);
  document.body.classList.toggle("waiting", !state.session.startedAt && !state.paused);
  el.pauseButton.textContent = state.paused ? "Start" : "Pause";
  el.loopToggle.classList.toggle("active", state.loopCurrent);
  el.dictationToggle.classList.toggle("active", state.dictation);
  el.translationToggle.classList.toggle("active", state.translationVisible);
  el.themeButton.classList.toggle("active", !state.lightMode);
  el.effectSoundToggle.checked = state.effectSound;
  el.autoSpeakToggle.checked = state.autoSpeak;
  el.ignoreCaseToggle.checked = state.ignoreCase;
  el.shuffleToggleSetting.checked = state.shuffle;
}

function renderDeckSelect() {
  el.deckSelect.innerHTML = state.decks.map((deck) => `<option value="${deck.id}">${escapeHtml(deck.name)}</option>`).join("");
  el.deckSelect.value = currentDeck().id;
  el.chapterButton.textContent = currentDeck().chapter || "第 1 章";
  el.accentButton.textContent = state.pronunciation === "en-GB" ? "英音" : "美音";
}

function renderWord() {
  const item = currentItem();
  const next = nextItem();
  const prev = prevItem();
  const practicingExample = practiceStage === "example";
  if (!item) {
    el.targetText.textContent = "请导入词库";
    el.hintText.textContent = "点击顶部导入按钮添加自己的单词和句子。";
    el.exampleText.textContent = "";
    el.exampleText.hidden = true;
    el.phonetic.textContent = "";
    el.nextText.textContent = "empty";
    el.nextHint.textContent = "";
    el.prevText.textContent = "";
    el.prevHint.textContent = "";
    return;
  }

  const target = currentTargetText(item);
  el.targetText.classList.toggle("has-wrong", flashWrongIndex >= 0);
  el.targetText.classList.toggle("sentence-target", practicingExample);
  el.targetText.innerHTML = state.dictation && !practicingExample ? renderDictationText(target) : renderCharacterText(target);
  el.targetText.appendChild(el.inlineSpeak);
  el.phonetic.textContent = item.phonetic || (item.type === "sentence" ? "" : "AmE");
  const exampleText = exampleFor(item);
  const exampleTranslation = exampleTranslationFor(item);
  const wordNote = `${item.text} · ${item.hint || "无释义"}`;
  el.hintText.textContent = practicingExample ? exampleTranslation : item.hint || "无释义";
  el.hintText.classList.toggle("example-translation", practicingExample);
  el.hintText.classList.toggle("hidden", !state.translationVisible);
  el.exampleText.textContent = practicingExample ? wordNote : exampleText;
  el.exampleText.classList.toggle("example-note", practicingExample);
  el.exampleText.hidden = practicingExample ? !wordNote : !exampleText;
  el.typedPreview.textContent = practicingExample ? "输入例句" : state.paused ? "已暂停" : state.session.startedAt ? "" : "按任意键开始";
  el.nextText.textContent = practicingExample ? next ? next.text : "" : "example";
  el.nextHint.textContent = practicingExample ? next ? next.hint || "" : "" : exampleFor(item);
  if (practicingExample) {
    el.prevText.textContent = item.text;
    el.prevHint.textContent = item.hint || "";
  } else {
    el.prevText.textContent = prev ? prev.text : "";
    el.prevHint.textContent = prev ? prev.hint || "" : "";
  }
  el.progressBar.style.width = `${Math.round(((currentDeck().progress % currentDeck().items.length) / currentDeck().items.length) * 100)}%`;
}

function currentTargetText(item = currentItem()) {
  if (!item) return "";
  const text = practiceStage === "example" ? exampleFor(item) : item.text;
  if (practiceStage === "example" || item.type === "sentence") {
    return text.replace(/[.。]$/, "");
  }
  return text;
}

function buildCharSegments(target, makeCharHtml) {
  const chars = Array.from(target);
  const parts = [];
  let wordBuffer = [];
  const flushWord = () => {
    if (wordBuffer.length) {
      parts.push(`<span class="char-word">${wordBuffer.join("")}</span>`);
      wordBuffer = [];
    }
  };
  chars.forEach((char, index) => {
    const html = makeCharHtml(char, index);
    if (char === " ") {
      flushWord();
      parts.push(html);
    } else {
      wordBuffer.push(html);
    }
  });
  flushWord();
  if (typed.length === chars.length) {
    parts.push('<span class="caret" aria-hidden="true"></span>');
  }
  return parts.join("");
}

function renderCharacterText(target) {
  return buildCharSegments(target, (char, index) => {
    let className = "char";
    if (index === typed.length) className += " current";
    if (wrongIndexes.has(index) || index === flashWrongIndex) className += " wrong";
    else if (index < typed.length) className += " done";
    return `${index === typed.length ? '<span class="caret" aria-hidden="true"></span>' : ''}<span class="${className}">${escapeHtml(
      char === " " ? "\u00a0" : char,
    )}</span>`;
  });
}

function renderDictationText(target) {
  const item = currentItem();
  const isSentence = item?.type === "sentence";
  return buildCharSegments(target, (char, index) => {
    let visible = index < typed.length ? char : isSentence ? "▪" : "_";
    let className = `char dictation-char ${isSentence ? "sentence-hidden" : "word-hidden"}`;
    if (char === " " && index >= typed.length) {
      className += " hidden-space";
    }
    if (index === typed.length) className += " current";
    if (wrongIndexes.has(index) || index === flashWrongIndex) className += " wrong";
    else if (index < typed.length) className += " done";
    return `${index === typed.length ? '<span class="caret" aria-hidden="true"></span>' : ''}<span class="${className}">${escapeHtml(
      visible,
    )}</span>`;
  });
}

function renderStats() {
  const elapsed = state.session.startedAt ? Date.now() - state.session.startedAt : 0;
  const minutes = elapsed ? Math.max(elapsed / 60000, 0.05) : 0;
  const wpm = minutes ? Math.round(state.session.completed / minutes) : 0;
  const itemAttempts = state.session.itemInputCount || 0;
  const accuracy = itemAttempts ? Math.round(((state.session.itemCorrectCount || 0) / itemAttempts) * 100) : 0;
  el.timeStat.textContent = formatTime(elapsed);
  el.inputStat.textContent = state.session.itemInputCount || 0;
  el.wpmStat.textContent = wpm;
  el.correctStat.textContent = state.session.itemCorrectCount || 0;
  el.accuracyStat.textContent = accuracy;
}

const AUTO_SKIP_PUNCT = /[,.;:!?()\[\]{}"…—–、，。！？；：（）【】「」“”‘’·]/u;
function isAutoSkipChar(ch) {
  return AUTO_SKIP_PUNCT.test(ch);
}
function autoFillSkipChars(target) {
  while (typed.length < target.length && isAutoSkipChar(target[typed.length])) {
    typed += target[typed.length];
  }
}

function handleKey(event) {
  if (isTypingInField(event.target)) return;
  handlePracticeKey(event.key, event);
}

function handlePracticeKey(key, event) {
  if (state.paused || el.modalBackdrop.hidden === false) return;
  const item = currentItem();
  if (!item) return;
  const target = currentTargetText(item);
  if (flashWrongIndex >= 0) {
    event?.preventDefault();
    return;
  }

  if (key === "Backspace") {
    event?.preventDefault();
    typed = typed.slice(0, -1);
    wrongIndexes.delete(typed.length);
    flashWrongIndex = -1;
    renderWord();
    return;
  }

  if (key === "Escape") {
    typed = "";
    wrongIndexes.clear();
    flashWrongIndex = -1;
    renderWord();
    return;
  }

  if (key === "Enter") {
    event?.preventDefault();
    if (typed === target) completeTarget();
    return;
  }

  if (key.length !== 1 || event?.altKey || event?.ctrlKey || event?.metaKey) return;
  event?.preventDefault();
  startTimer();

  autoFillSkipChars(target);

  const index = typed.length;
  if (index >= target.length) return;

  if (isAutoSkipChar(key)) {
    return;
  }

  state.session.inputCount += 1;

  const correctChar = target[index];
  const isCorrect = state.ignoreCase ? key.toLowerCase() === correctChar.toLowerCase() : key === correctChar;

  if (isCorrect) {
    typed += correctChar;
    state.session.correctCount += 1;
    flashWrongIndex = -1;
    autoFillSkipChars(target);
  } else {
    typed += key;
    wrongIndexes.add(index);
    flashWrong(index, target);
    state.session.mistakeCount += 1;
    recordError(item, typed);
    playSound("beep");
    state.session.itemInputCount += 1;
  }

  if (typed.length === target.length && typed === target) {
    window.clearTimeout(pendingCompletion);
    pendingCompletion = window.setTimeout(completeTarget, 170);
  }

  saveState();
  render();
}

function flashWrong(index, target) {
  flashWrongIndex = index;
  window.clearTimeout(flashWrong.timer);
  flashWrong.timer = window.setTimeout(() => {
    if (flashWrongIndex === index) {
      const lastSpace = typeof target === "string" ? target.lastIndexOf(" ", index - 1) : -1;
      const wordStart = lastSpace + 1;
      typed = typed.slice(0, wordStart);
      const kept = new Set();
      wrongIndexes.forEach((i) => { if (i < wordStart) kept.add(i); });
      wrongIndexes = kept;
      flashWrongIndex = -1;
      render();
    }
  }, 300);
}

function isTypingInField(target) {
  return target !== el.practiceInput && ["INPUT", "TEXTAREA", "SELECT"].includes(target.tagName);
}

function focusPracticeInput() {
  if (!el.practiceInput || state.paused || el.modalBackdrop.hidden === false) return;
  el.practiceInput.value = "";
  el.practiceInput.focus({ preventScroll: true });
}

function handlePracticeBeforeInput(event) {
  const type = event.inputType;
  if (type === "deleteContentBackward") {
    handlePracticeKey("Backspace", event);
  } else if (type === "insertLineBreak") {
    handlePracticeKey("Enter", event);
  } else if (type === "insertText" && event.data) {
    Array.from(event.data).forEach((char) => handlePracticeKey(char, event));
  }
  event.preventDefault();
  el.practiceInput.value = "";
}

function resetPracticeInput() {
  if (el.practiceInput) el.practiceInput.value = "";
}

function recordError(item, answer) {
  const last = state.errors[0];
  if (last && last.text === item.text && Date.now() - last.createdAt < 1200) return;
  state.errors.unshift({
    id: `err-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    deckName: currentDeck().name,
    text: item.text,
    hint: item.hint || "",
    answer,
    type: item.type || inferType(item.text),
    createdAt: Date.now(),
  });
  state.errors = state.errors.slice(0, 200);
}

function completeTarget() {
  const deck = currentDeck();
  const item = currentItem();
  state.session.itemInputCount += 1;
  state.session.itemCorrectCount += 1;
  typed = "";
  wrongIndexes.clear();
  flashWrongIndex = -1;
  playSound("correct");

  if (practiceStage === "word" && exampleFor(item)) {
    practiceStage = "example";
  } else {
    if (!state.loopCurrent && deck.items.length) {
      deck.progress = (deck.progress + 1) % deck.items.length;
    }
    practiceStage = "word";
    state.session.completed += 1;
    const dayKey = todayKey();
    state.dailyStats = state.dailyStats || {};
    state.dailyStats[dayKey] = (state.dailyStats[dayKey] || 0) + 1;
    if (!String(deck.id || "").startsWith("review-")) {
      state.dailyHistory = state.dailyHistory || {};
      state.dailyHistory[dayKey] = state.dailyHistory[dayKey] || [];
      const exists = state.dailyHistory[dayKey].some((h) => h.text === item.text && h.deckId === deck.id);
      if (!exists) {
        state.dailyHistory[dayKey].push({
          deckId: deck.id,
          text: item.text,
          hint: item.hint || "",
          example: item.example || "",
          exampleZh: item.exampleZh || "",
          phonetic: item.phonetic || "",
          type: item.type || inferType(item.text),
        });
      }
    }
  }

  saveState();
  render();
  if (state.autoSpeak) window.setTimeout(speakCurrent, 220);
}

function speakCurrent() {
  const item = currentItem();
  if (!item || !("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(currentTargetText(item));
  utterance.lang = state.pronunciation;
  utterance.rate = practiceStage === "example" || item.type === "sentence" ? 0.92 : 0.82;
  window.speechSynthesis.speak(utterance);
}

function parseImport(raw) {
  const text = raw.trim();
  if (!text) return [];

  if (text.startsWith("[") || text.startsWith("{")) {
    const data = JSON.parse(text);
    const rows = Array.isArray(data) ? data : data.items;
    if (!Array.isArray(rows)) throw new Error("JSON 需要是数组，或包含 items 数组。");
    return rows
      .map((row) =>
        makeItem(
          row.text || row.word || row.sentence || "",
          row.hint || row.translation || row.meaning || "",
          row.example || "",
          row.exampleZh || row.example_zh || row.exampleTranslation || row.example_translation || row.sentenceTranslation || "",
        ),
      )
      .filter((item) => item.text);
  }

  return text
    .split(/\r?\n/)
    .map((line) => line.trim())
    .filter(Boolean)
    .map((line) => {
      const [textPart, ...hintParts] = splitLine(line);
      return makeItem(textPart, hintParts.join(" ").trim());
    })
    .filter((item) => item.text);
}

function splitLine(line) {
  for (const separator of ["\t", "|", ",", "，"]) {
    if (!line.includes(separator)) continue;
    if (separator === "," || separator === "，") {
      const [head, ...rest] = line.split(separator);
      const tail = rest.join(separator).trim();
      const looksLikeWordWithHint = !/\s/.test(head.trim()) && /[\u4e00-\u9fa5]/.test(tail);
      if (!looksLikeWordWithHint) continue;
    }
    return line.split(separator);
  }
  return [line, ""];
}

function makeItem(text, hint, example = "", exampleZh = "") {
  const cleanText = String(text).trim();
  return {
    text: cleanText,
    hint: String(hint || "").trim(),
    example: String(example || "").trim(),
    exampleZh: String(exampleZh || "").trim(),
    phonetic: "",
    type: inferType(cleanText),
  };
}

function inferType(text) {
  return /\s|[.!?。！？]/.test(text.trim()) ? "sentence" : "word";
}

function exampleFor(item) {
  if (item.example) return item.example;
  return naturalExample(item);
}

function exampleTranslationFor(item) {
  if (item.exampleZh) return item.exampleZh;
  if (item.exampleTranslation) return item.exampleTranslation;
  if (item.example_translation) return item.example_translation;
  return naturalExampleTranslation(item);
}

function naturalExample(item) {
  const word = String(item.text || "").trim();
  const hint = String(item.hint || "").toLowerCase();
  if (!word) return "";
  if (/\s/.test(word)) return `People still say "${word}" when they want to keep the conversation simple.`;
  if (/ad\.|adv|副/.test(hint) || word.endsWith("ly")) return `She handled the situation ${word}, even when people around her started to panic.`;
  if (/vt|vi|v\.|动/.test(hint)) return `They tried to ${word} it before the problem got out of hand.`;
  if (/a\.|adj|形/.test(hint) || /(al|ive|ous|able|ible|ic|ent|ant|ary|less|ful)$/.test(word)) {
    return `It was ${articleFor(word)} ${word} moment, and everyone in the room felt it.`;
  }
  return `The ${word} became part of the conversation almost immediately.`;
}

function naturalExampleTranslation(item) {
  const word = String(item.text || "").trim();
  const hint = String(item.hint || "这个词").trim();
  const example = exampleFor(item);
  if (!example) return "";
  if (/\s/.test(word)) return `人们想把话说简单时，仍然会用 “${word}” 这个说法。`;
  if (example === `She handled the situation ${word}, even when people around her started to panic.`) {
    return "即使周围的人开始慌乱，她还是稳住了局面。";
  }
  if (example === `They tried to ${word} it before the problem got out of hand.`) {
    return "他们试图在问题失控前处理好它。";
  }
  if (example === `It was ${articleFor(word)} ${word} moment, and everyone in the room felt it.`) {
    return "那是一个让人感受很明显的时刻，房间里的每个人都察觉到了。";
  }
  if (example === `The ${word} became part of the conversation almost immediately.`) {
    return "这个话题几乎立刻成了大家谈话的一部分。";
  }
  return `这句话的大意是：${hint}。`;
}

function articleFor(word) {
  return /^[aeiou]/i.test(word) ? "an" : "a";
}

function addDeck(name, items) {
  const deck = {
    id: `deck-${Date.now()}-${Math.random().toString(16).slice(2)}`,
    name: name.trim() || `导入词库 ${state.decks.length + 1}`,
    chapter: "第 1 章",
    items,
    progress: 0,
    createdAt: Date.now(),
  };
  state.decks.push(deck);
  state.currentDeckId = deck.id;
  state.session = { ...defaultState.session };
  typed = "";
  wrongIndexes.clear();
  flashWrongIndex = -1;
  practiceStage = "word";
  buildOrder();
  saveState();
  closeModal();
  render();
}

function appendToCurrentDeck(items) {
  currentDeck().items.push(...items);
  typed = "";
  wrongIndexes.clear();
  flashWrongIndex = -1;
  practiceStage = "word";
  buildOrder();
  saveState();
  closeModal();
  render();
}

function openModal(panelName) {
  el.modalBackdrop.hidden = false;
  el.importPanel.hidden = panelName !== "import";
  el.libraryPanel.hidden = panelName !== "library";
  el.archivePanel.hidden = panelName !== "archive";
  el.errorsPanel.hidden = panelName !== "errors";
  el.dailyPanel.hidden = panelName !== "daily";
  el.settingsPanel.hidden = panelName !== "settings";
  const titleMap = {
    import: ["Import", "导入单词和句子"],
    library: ["Library", "词库管理"],
    archive: ["Archive", "词库归档"],
    errors: ["Error Book", "错题本"],
    daily: ["Daily", "每日完成统计"],
    settings: ["Settings", "设置"],
  };
  el.modalKicker.textContent = titleMap[panelName][0];
  el.modalTitle.textContent = titleMap[panelName][1];
  renderLists();
}

function closeModal() {
  el.modalBackdrop.hidden = true;
}

function renderLists() {
  const deck = currentDeck();
  renderArchive(deck);
  el.deckItems.innerHTML = deck.items.length
    ? deck.items
        .map(
          (item, index) => `
            <div class="list-item">
              <div>
                <strong>${index + 1}. ${escapeHtml(item.text)}</strong>
                <p>${escapeHtml(item.hint || "无释义")}</p>
              </div>
              <span class="badge">${item.type === "sentence" ? "句子" : "单词"}</span>
            </div>
          `,
        )
        .join("")
    : `<div class="empty-state">当前词库为空。</div>`;

  el.errorItems.innerHTML = state.errors.length
    ? state.errors
        .map(
          (item) => `
            <div class="list-item">
              <div>
                <strong>${escapeHtml(item.text)}</strong>
                <p>${escapeHtml(item.hint || "无释义")}</p>
                <p>错误输入：${escapeHtml(item.answer || "空")}</p>
              </div>
              <span class="badge">${escapeHtml(item.deckName)}</span>
            </div>
          `,
        )
        .join("")
    : `<div class="empty-state">暂无错题。输错时会自动记录。</div>`;

  renderDailyStats();
}

function todayKey(date = new Date()) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function renderDailyStats() {
  const stats = state.dailyStats || {};
  const history = state.dailyHistory || {};
  const dayKeys = Array.from(new Set([...Object.keys(stats), ...Object.keys(history)]));
  const entries = dayKeys
    .map((day) => [day, stats[day] || 0, (history[day] || []).length])
    .sort((a, b) => b[0].localeCompare(a[0]));
  const today = todayKey();
  const todayCount = stats[today] || 0;
  const total = entries.reduce((sum, [, n]) => sum + n, 0);
  const days = entries.length;
  el.dailySummary.innerHTML = `<strong>今日 ${todayCount} 词</strong> · 总计 ${total} 词 · 累计 ${days} 天`;
  el.dailyItems.innerHTML = entries.length
    ? entries
        .map(
          ([day, count, uniqueCount]) => `
            <div class="list-item">
              <div>
                <strong>${escapeHtml(day)}${day === today ? "（今天）" : ""}</strong>
                <small>记录 ${uniqueCount} 词</small>
              </div>
              <div class="daily-actions">
                <span class="badge">${count} 次</span>
                ${uniqueCount ? `<button class="ghost-button" type="button" data-review-day="${escapeHtml(day)}">复习</button>` : ""}
              </div>
            </div>
          `,
        )
        .join("")
    : `<div class="empty-state">暂无记录。完成单词后会自动统计。</div>`;
}

function renderArchive(deck = currentDeck()) {
  const counts = getArchiveLetterCounts(deck);
  const letters = [ARCHIVE_ALL, ..."ABCDEFGHIJKLMNOPQRSTUVWXYZ"];
  const filtered = getArchiveItems(deck);
  const total = deck.items.length;
  const progress = total ? Math.min(deck.progress + 1, total) : 0;

  el.archiveDeckName.textContent = deck.name;
  el.archiveSummary.textContent = `${total} 词 · 当前 ${progress}/${total}`;
  el.archiveSearch.value = archiveQuery;
  el.archiveLetters.innerHTML = letters
    .map((letter) => {
      const label = letter === ARCHIVE_ALL ? "全部" : letter;
      const count = letter === ARCHIVE_ALL ? total : counts[letter] || 0;
      const active = archiveLetter === letter ? " active" : "";
      return `<button class="archive-letter${active}" type="button" data-letter="${letter}">${label}<span>${count}</span></button>`;
    })
    .join("");

  el.archiveWords.innerHTML = filtered.length
    ? filtered
        .map(
          ({ item, index }) => `
            <button class="archive-card" type="button" data-index="${index}">
              <strong>${escapeHtml(item.text)}</strong>
              <span>${escapeHtml(item.phonetic || "")}</span>
              <p>${escapeHtml(item.hint || "无释义")}</p>
              <em>${escapeHtml(exampleFor(item))}</em>
              <small>${escapeHtml(exampleTranslationFor(item))}</small>
            </button>
          `,
        )
        .join("")
    : `<div class="empty-state">没有匹配的词。</div>`;
}

function getArchiveLetterCounts(deck) {
  return deck.items.reduce((counts, item) => {
    const letter = firstArchiveLetter(item.text);
    counts[letter] = (counts[letter] || 0) + 1;
    return counts;
  }, {});
}

function getArchiveItems(deck) {
  const query = archiveQuery.trim().toLowerCase();
  return deck.items
    .map((item, index) => ({ item, index }))
    .filter(({ item }) => archiveLetter === ARCHIVE_ALL || firstArchiveLetter(item.text) === archiveLetter)
    .filter(({ item }) => {
      if (!query) return true;
      return [item.text, item.hint, item.phonetic, item.example, item.exampleZh, exampleFor(item), exampleTranslationFor(item)].some((value) =>
        String(value || "").toLowerCase().includes(query),
      );
    });
}

function firstArchiveLetter(text) {
  const match = String(text || "").trim().match(/[a-z]/i);
  return match ? match[0].toUpperCase() : "#";
}

function startDailyReview(dayKey) {
  const history = (state.dailyHistory || {})[dayKey] || [];
  if (!history.length) return;
  const seen = new Set();
  const items = [];
  history.forEach((h) => {
    if (seen.has(h.text)) return;
    seen.add(h.text);
    items.push({
      text: h.text,
      hint: h.hint || "",
      example: h.example || "",
      exampleZh: h.exampleZh || "",
      phonetic: h.phonetic || "",
      type: h.type || inferType(h.text),
    });
  });
  if (!items.length) return;
  const reviewId = `review-${dayKey}`;
  const deck = {
    id: reviewId,
    name: `复习 ${dayKey}`,
    items,
    progress: 0,
    chapter: "复习",
  };
  const existingIdx = state.decks.findIndex((d) => d.id === reviewId);
  if (existingIdx >= 0) state.decks[existingIdx] = deck;
  else state.decks.push(deck);
  state.currentDeckId = reviewId;
  state.session = { ...defaultState.session };
  typed = "";
  wrongIndexes.clear();
  flashWrongIndex = -1;
  practiceStage = "word";
  buildOrder();
  saveState();
  closeModal();
  render();
}

function jumpToArchiveItem(index) {
  const deck = currentDeck();
  const itemIndex = Number(index);
  if (!Number.isInteger(itemIndex) || itemIndex < 0 || itemIndex >= deck.items.length) return;
  buildOrder();
  const orderIndex = currentOrder.indexOf(itemIndex);
  deck.progress = orderIndex >= 0 ? orderIndex : itemIndex;
  state.session = { ...defaultState.session };
  typed = "";
  wrongIndexes.clear();
  flashWrongIndex = -1;
  practiceStage = "word";
  saveState();
  closeModal();
  render();
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, (char) => {
    const map = { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" };
    return map[char];
  });
}

function wireEvents() {
  document.addEventListener("keydown", handleKey);
  document.querySelector(".practice-screen").addEventListener("pointerdown", (event) => {
    if (!event.target.closest("button, input, textarea, select")) focusPracticeInput();
  });
  el.practiceInput.addEventListener("beforeinput", handlePracticeBeforeInput);
  el.practiceInput.addEventListener("input", resetPracticeInput);
  el.speakButton.addEventListener("click", speakCurrent);
  el.inlineSpeak.addEventListener("click", speakCurrent);
  el.prevWordBtn.addEventListener("click", goToPrevious);
  el.nextWordBtn.addEventListener("click", goToNext);
  el.importOpen.addEventListener("click", () => openModal("import"));
  el.libraryOpen.addEventListener("click", () => openModal("library"));
  el.archiveOpen.addEventListener("click", () => openModal("archive"));
  el.errorsOpen.addEventListener("click", () => openModal("errors"));
  el.dailyOpen.addEventListener("click", () => openModal("daily"));
  el.settingsOpen.addEventListener("click", () => openModal("settings"));
  el.chapterButton.addEventListener("click", () => openModal("library"));
  el.accentButton.addEventListener("click", () => {
    state.pronunciation = state.pronunciation === "en-US" ? "en-GB" : "en-US";
    saveState();
    render();
    speakCurrent();
  });
  el.modalClose.addEventListener("click", closeModal);
  el.modalBackdrop.addEventListener("click", (event) => {
    if (event.target === el.modalBackdrop) closeModal();
  });
  el.archiveSearch.addEventListener("input", () => {
    archiveQuery = el.archiveSearch.value;
    renderArchive();
  });
  el.archiveLetters.addEventListener("click", (event) => {
    const button = event.target.closest("[data-letter]");
    if (!button) return;
    archiveLetter = button.dataset.letter || ARCHIVE_ALL;
    renderArchive();
  });
  el.archiveWords.addEventListener("click", (event) => {
    const button = event.target.closest("[data-index]");
    if (!button) return;
    jumpToArchiveItem(button.dataset.index);
  });

  el.deckSelect.addEventListener("change", () => {
    state.currentDeckId = el.deckSelect.value;
    state.session = { ...defaultState.session };
    typed = "";
    wrongIndexes.clear();
    flashWrongIndex = -1;
    practiceStage = "word";
    buildOrder();
    saveState();
    render();
  });

  el.loopToggle.addEventListener("click", () => {
    state.loopCurrent = !state.loopCurrent;
    saveState();
    render();
  });

  el.dictationToggle.addEventListener("click", () => {
    state.dictation = !state.dictation;
    saveState();
    render();
  });

  el.translationToggle.addEventListener("click", () => {
    state.translationVisible = !state.translationVisible;
    saveState();
    render();
  });

  el.pauseButton.addEventListener("click", () => {
    state.paused = !state.paused;
    saveState();
    render();
  });

  el.themeButton.addEventListener("click", () => {
    state.lightMode = !state.lightMode;
    saveState();
    render();
  });

  el.effectSoundToggle.addEventListener("change", () => {
    state.effectSound = el.effectSoundToggle.checked;
    saveState();
    render();
    if (state.effectSound) playSound("correct");
  });

  el.autoSpeakToggle.addEventListener("change", () => {
    state.autoSpeak = el.autoSpeakToggle.checked;
    saveState();
    render();
  });

  el.ignoreCaseToggle.addEventListener("change", () => {
    state.ignoreCase = el.ignoreCaseToggle.checked;
    saveState();
    render();
  });

  el.shuffleToggleSetting.addEventListener("change", () => {
    state.shuffle = el.shuffleToggleSetting.checked;
    typed = "";
    wrongIndexes.clear();
    flashWrongIndex = -1;
    practiceStage = "word";
    buildOrder();
    saveState();
    render();
  });

  el.loadSample.addEventListener("click", () => {
    el.importText.value = sampleItems.map((item) => `${item.text} | ${item.hint}`).join("\n");
  });

  el.fileInput.addEventListener("change", async () => {
    const file = el.fileInput.files[0];
    if (!file) return;
    el.importText.value = await file.text();
    if (!el.deckName.value || el.deckName.value === "我的词库") {
      el.deckName.value = file.name.replace(/\.[^.]+$/, "");
    }
  });

  el.importButton.addEventListener("click", () => {
    try {
      const items = parseImport(el.importText.value);
      if (!items.length) throw new Error("没有解析到内容。");
      addDeck(el.deckName.value, items);
    } catch (error) {
      alert(error.message || "导入失败，请检查格式。");
    }
  });

  el.appendButton.addEventListener("click", () => {
    try {
      const items = parseImport(el.importText.value);
      if (!items.length) throw new Error("没有解析到内容。");
      appendToCurrentDeck(items);
    } catch (error) {
      alert(error.message || "追加失败，请检查格式。");
    }
  });

  el.resetProgress.addEventListener("click", () => {
    currentDeck().progress = 0;
    state.session = { ...defaultState.session };
    typed = "";
    wrongIndexes.clear();
    flashWrongIndex = -1;
    practiceStage = "word";
    saveState();
    render();
  });

  el.deleteDeck.addEventListener("click", () => {
    if (state.decks.length <= 1) {
      alert("至少保留一个词库。");
      return;
    }
    const deck = currentDeck();
    if (!confirm(`删除「${deck.name}」？`)) return;
    state.decks = state.decks.filter((item) => item.id !== deck.id);
    state.currentDeckId = state.decks[0].id;
    typed = "";
    wrongIndexes.clear();
    flashWrongIndex = -1;
    practiceStage = "word";
    buildOrder();
    saveState();
    closeModal();
    render();
  });

  el.clearErrors.addEventListener("click", () => {
    if (!confirm("清空全部错题？")) return;
    state.errors = [];
    saveState();
    renderLists();
  });

  el.clearDaily.addEventListener("click", () => {
    if (!confirm("清空所有每日统计记录？")) return;
    state.dailyStats = {};
    state.dailyHistory = {};
    saveState();
    renderLists();
  });

  el.dailyItems.addEventListener("click", (event) => {
    const button = event.target.closest("button[data-review-day]");
    if (!button) return;
    startDailyReview(button.dataset.reviewDay);
  });
}

wireEvents();
buildOrder();
render();
timerId = window.setInterval(renderStats, 500);
if ("serviceWorker" in navigator && /^https?:$/.test(window.location.protocol)) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}
    </script>
  </body>
</html>
